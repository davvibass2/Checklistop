<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChecklistOP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#1B241F;--paper:#F1F4EC;--card:#FFF;--slate:#202B2A;--slate2:#2B3936;--blue:#1482C8;--blue2:#0D5A94;--amber:#D9A441;--amber2:#B7863A;--ok:#3B8F63;--nok:#C0453A;--na:#8B8677;--border:#D6D9C9;--muted:#63695C;--display:"Space Grotesk",sans-serif;--body:"Inter",sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);min-height:100vh}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--slate);color:#EEF0E7;padding:16px 20px;position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:700;font-size:17px}
.logo-chip{background:linear-gradient(180deg,var(--blue),var(--blue2));border-radius:10px;padding:3px 7px;display:flex;align-items:center}
.logo-chip img{height:30px;width:auto;display:block}
.uchip{font-family:var(--mono);font-size:11px;color:#B9BEAE;text-align:right;line-height:1.5}
.uchip button{background:none;border:none;color:var(--amber);font-family:var(--mono);font-size:11px;cursor:pointer;padding:0;text-decoration:underline}
main{flex:1;padding:20px 20px 110px}
.screen{animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
h1.t{font-family:var(--display);font-size:23px;font-weight:700;margin:4px 0;letter-spacing:-.01em}
p.s{color:var(--muted);font-size:14px;margin:0 0 20px;line-height:1.4}
.fl{display:block;font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:600;margin-bottom:5px}
select,input[type=text],input[type=number],input[type=date],input[type=password],textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--card);font-size:15px;font-family:var(--body);color:var(--ink);margin-bottom:15px}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--blue)}
textarea{resize:vertical;min-height:80px}
input.pin{font-family:var(--mono);font-size:28px;letter-spacing:.45em;text-align:center;padding:14px}
.trow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:15px}
.tbtn{padding:11px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);font-weight:600;font-size:14px;cursor:pointer;color:var(--muted)}
.tbtn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.bp{width:100%;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:var(--body);cursor:pointer;margin-top:2px}
.bp:active{transform:scale(.98)}.bp:disabled{background:#C6CABB;color:#8A8F80}
.ba{width:100%;padding:13px;background:var(--amber);color:var(--slate);border:none;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer}
.bs{width:100%;padding:12px;background:transparent;color:var(--blue);border:1.5px solid var(--blue);border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;margin-top:9px}
.sb{margin-bottom:20px}
.sh{display:flex;align-items:baseline;gap:8px;margin-bottom:9px;padding-bottom:5px;border-bottom:2px solid var(--slate)}
.sn{font-family:var(--mono);font-size:12px;color:var(--amber2);font-weight:700}
.sname{font-family:var(--display);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.02em}
.ir{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px}
.ir.nk{border-color:var(--nok)}
.itop{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ilbl{font-size:14px;font-weight:500;flex:1}
.sbtns{display:flex;gap:5px}
.sbtn{font-family:var(--mono);font-size:11px;font-weight:700;padding:7px 9px;border-radius:7px;border:1.5px solid var(--border);background:var(--paper);cursor:pointer;min-width:38px}
.sbtn[data-s=ok].on,.sbtn[data-s=sim].on{background:var(--ok);color:#fff;border-color:var(--ok)}
.sbtn[data-s=nok].on,.sbtn[data-s=nao].on{background:var(--nok);color:#fff;border-color:var(--nok)}
.sbtn[data-s=na].on{background:var(--na);color:#fff;border-color:var(--na)}
.iex{margin-top:11px;padding-top:11px;border-top:1px dashed var(--border)}
.iex textarea{margin-bottom:7px;font-size:14px;min-height:65px}
.rtag{font-size:11px;color:var(--nok);font-family:var(--mono);margin-bottom:5px;display:block}
.pstrip,.pstrip2{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px}
.pthumb{width:54px;height:54px;border-radius:8px;object-fit:cover;border:1.5px solid var(--border);cursor:pointer}
.padd{font-size:12px;padding:9px 13px;border-radius:8px;border:1.5px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;display:inline-block}
.sfooter{position:sticky;bottom:0;background:linear-gradient(to top,var(--paper) 65%,transparent);padding:13px 20px 17px;margin:0 -20px}
.ppill{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:center;margin-bottom:9px}
.err{background:#FBE7E4;color:var(--nok);padding:9px 13px;border-radius:8px;font-size:13px;margin-bottom:15px}
.ldg,.emp{text-align:center;color:var(--muted);padding:34px 0;font-family:var(--mono);font-size:13px}
.sw{display:flex;flex-direction:column;align-items:center;padding:42px 20px;text-align:center}
.stamp{border:4px solid var(--ok);color:var(--ok);font-family:var(--mono);font-weight:800;font-size:19px;letter-spacing:.08em;padding:13px 21px;border-radius:8px;transform:rotate(-5deg);animation:si .3s cubic-bezier(.2,1.3,.4,1);margin-bottom:17px}
@keyframes si{from{transform:rotate(-5deg) scale(2);opacity:0}to{transform:rotate(-5deg) scale(1);opacity:1}}
.sd{color:var(--muted);font-size:14px;margin-bottom:24px}
.lc{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;margin-bottom:9px;cursor:pointer}
.ltop{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:5px}
.lp{font-weight:700;font-size:15px}
.bdg{display:inline-block;font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:100px;font-weight:700;text-transform:uppercase}
.bdg.motorista{background:#DCEEE7;color:var(--blue)}.bdg.mecanico{background:#FBE6CC;color:var(--amber2)}.bdg.lavador{background:#DCEEF9;color:var(--blue2)}.bdg.pendente{background:#FBE6CC;color:var(--amber2)}.bdg.aprovado{background:#DCEEE7;color:var(--ok)}
.tabs{display:flex;gap:5px;margin-bottom:18px;background:var(--slate2);padding:4px;border-radius:12px;flex-wrap:wrap}
.tab{flex:1;padding:9px 3px;border:none;background:transparent;color:#C6C9BB;font-weight:600;font-size:12px;border-radius:9px;cursor:pointer;min-width:55px}
.tab.on{background:var(--amber);color:var(--slate)}
.frow{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:6px 11px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer}
.fbtn.on{background:var(--slate);color:#fff;border-color:var(--slate)}
.ar{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:9px}
.ar .an{font-weight:600;font-size:14px}.ar .asub{font-family:var(--mono);font-size:11px;color:var(--muted)}
.ar .aact{display:flex;gap:5px;flex-wrap:wrap}
.ib{background:none;border:1.5px solid var(--border);border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer;color:var(--muted);font-family:var(--body)}
.ib.d{color:var(--nok);border-color:var(--nok)}
.fab{width:100%;padding:13px;border-radius:12px;border:2px dashed var(--blue);background:transparent;color:var(--blue);font-weight:700;font-size:14px;cursor:pointer;margin-bottom:17px}
.fc{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:15px;margin-bottom:15px}
.drow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px}
.dtag{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
.dtag.ok,.dtag.sim{background:#DCEEE7;color:var(--ok)}.dtag.nok,.dtag.nao{background:#FBE4E1;color:var(--nok)}.dtag.na{background:#ECEAE2;color:var(--na)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:15px}
.mc{background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:9px 11px}
.mc .k{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase}.mc .v{font-size:14px;font-weight:600;margin-top:2px}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.kc{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:13px}
.kv{font-family:var(--display);font-size:25px;font-weight:700}.kl{font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--muted);margin-top:1px}
.cc{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:15px;margin-bottom:17px}
.cc h3{font-family:var(--display);font-size:13px;margin:0 0 11px;text-transform:uppercase;letter-spacing:.02em}
.erow{display:flex;flex-direction:column;gap:7px;margin-bottom:18px}
.ts{width:100%;border-collapse:collapse;font-size:13px}
.ts th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;color:var(--muted);padding:5px 7px;border-bottom:2px solid var(--slate)}
.ts td{padding:7px;border-bottom:1px solid var(--border)}
.scbox{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-radius:14px;padding:17px;text-align:center;margin-bottom:15px}
.scv{font-family:var(--display);font-size:46px;font-weight:800;line-height:1}
.scl{font-size:13px;opacity:.9;margin-top:3px}
.scc{display:inline-block;padding:4px 13px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;margin-top:7px}
.msc{display:flex;justify-content:space-around;margin-top:11px;padding-top:11px;border-top:1px solid rgba(255,255,255,.25)}
.msc div{text-align:center}.msc .mv{font-size:21px;font-weight:700}.msc .ml{font-size:11px;opacity:.85}
.ai{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);gap:9px}
.ai:last-child{border-bottom:none}.ait{flex:1;font-size:14px;line-height:1.35}
.abs{display:flex;gap:5px;flex-shrink:0}
.ab{min-width:44px;height:37px;border:2px solid var(--border);border-radius:8px;background:var(--card);font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ab.sa{border-color:#1e8e3e;background:#1e8e3e;color:#fff}.ab.sb{border-color:var(--amber);background:var(--amber);color:var(--slate)}.ab.sc{border-color:var(--nok);background:var(--nok);color:#fff}
.ab.sl{border-color:#1e8e3e;background:#1e8e3e;color:#fff}.ab.sm{border-color:var(--amber);background:var(--amber);color:var(--slate)}.ab.sh{border-color:var(--nok);background:var(--nok);color:#fff}
.atabs{display:flex;gap:5px;margin-bottom:18px}
.atab{flex:1;padding:11px 5px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-weight:600;font-size:14px;border-radius:10px;cursor:pointer}
.atab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.hc{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px}
.hn{font-family:var(--display);font-size:27px;font-weight:800}
@media print{body *{visibility:hidden}#pr,#pr *{visibility:visible}#pr{position:absolute;top:0;left:0;width:100%;padding:20px}.np{display:none!important}}
</style>
</head>

function fmtD(iso){const d=new Date(iso);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function clsNota(n){if(n>=85)return{l:'EXCELENTE',c:'#1e8e3e'};if(n>=70)return{l:'BOM',c:'#1482C8'};if(n>=50)return{l:'ATENÇÃO',c:'#D9A441'};return{l:'CRÍTICO',c:'#C0453A'};}
function calcP(r){const v=Object.values(r);if(!v.length)return null;return v.reduce((s,x)=>s+(x==='A'?100:x==='B'?66.6:33.3),0)/v.length;}
function calcV(r){const v=Object.values(r);if(!v.length)return null;return v.reduce((s,x)=>s+(100-parseFloat(x)),0)/v.length;}
function nFinal(p,v){if(p===null&&v===null)return null;if(p===null)return v;if(v===null)return p;return p*.6+v*.4;}

function getPR(p){
  const now=new Date();let start=null,end=null,label='';
  const fmt=d=>d.toLocaleDateString('pt-BR');
  if(p==='mes_atual'){start=new Date(now.getFullYear(),now.getMonth(),1);end=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);label=`Mês atual (${fmt(start)} a ${fmt(end)})`;}
  else if(p==='mes_passado'){start=new Date(now.getFullYear(),now.getMonth()-1,1);end=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);label=`Mês passado (${fmt(start)} a ${fmt(end)})`;}
  else if(p==='ultimos_30'){end=now;start=new Date(now.getTime()-30*24*60*60*1000);label=`Últimos 30 dias (${fmt(start)} a ${fmt(end)})`;}
  else if(p==='custom'){if(S.rStart)start=new Date(S.rStart+'T00:00:00');if(S.rEnd)end=new Date(S.rEnd+'T23:59:59');label=(start&&end)?`${fmt(start)} a ${fmt(end)}`:'Período personalizado';}
  else{label='Todo o período';}
  return{start,end,label};
}
async function ldReport(p){
  const pr=p||S.rPeriod||'mes_atual';const{start,end,label}=getPR(pr);
  let q=sb.from('checklists').select('*').order('criado_em',{ascending:false}).limit(2000);
  if(start)q=q.gte('criado_em',start.toISOString());
  if(end)q=q.lte('criado_em',end.toISOString());
  const{data}=await q;const cls=data||[];
  const pp={motorista:0,mecanico:0,lavador:0};const ps={pendente:0,aprovado:0};
  const pv={};const ppe={};const pg={};const prob={};let tip=0;
  const agm=(pr==='tudo')||(pr==='custom'&&start&&end&&(end.getTime()-start.getTime())/(86400000)>45);
  cls.forEach(c=>{
    pp[c.perfil]=(pp[c.perfil]||0)+1;ps[c.status]=(ps[c.status]||0)+1;
    ppe[c.usuario_nome]=(ppe[c.usuario_nome]||0)+1;
    const ch=agm?(c.criado_em||'').slice(0,7):(c.criado_em||'').slice(0,10);
    pg[ch]=(pg[ch]||0)+1;
    if(!pv[c.veiculo_placa])pv[c.veiculo_placa]={t:0,p:0};pv[c.veiculo_placa].t++;
    (c.itens||[]).forEach(i=>{if(i.status==='nok'||i.status==='nao'){pv[c.veiculo_placa].p++;tip++;const k=`${i.secao} — ${i.item}`;prob[k]=(prob[k]||0)+1;}});
  });
  const go=Object.keys(pg).sort().slice(-14);
  const tv=Object.entries(pv).sort((a,b)=>b[1].p-a[1].p).slice(0,8);
  const tp2=Object.entries(prob).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const tpe=Object.entries(ppe).sort((a,b)=>b[1]-a[1]);
  SS({rPeriod:pr,report:{total:cls.length,pp,ps,tip,go,pg,agm,tv,tp2,tpe,label}});
}

function rCL(){

    sn++;
    const rws=lst.map(nm=>{

      const bs=tpl.ss.map(st=>`<button class="sbtn ${it.status===st?'on':''}" data-s="${st}" onclick="setIS(${idx},'${st}')">${SL[st]}</button>`).join('');

      return`<div class="ir ${ip?'nk':''}"><div class="itop"><div class="ilbl">${nm}</div><div class="sbtns">${bs}</div></div>${ex}</div>`;
    }).join('');

  return`<h1 class="t">${PL[tp]} — ${S.selV.placa}</h1><p class="s">Marque o status de cada item.</p>${sh}${ab}${obs}
    <div class="sfooter"><div class="ppill">${mc} de ${tot} marcados</div><button class="bp" ${S.submitting?'disabled':''} onclick="submitCL()">${S.submitting?'Enviando...':'Enviar checklist'}</button></div>`;
}

  <div class="np" style="display:flex;gap:7px;align-items:flex-end;margin-bottom:18px;flex-wrap:wrap;"><div style="flex:1;min-width:125px;"><label class="fl">De</label><input type="date" id="rs" value="${S.rStart}" style="margin-bottom:0;"></div><div style="flex:1;min-width:125px;"><label class="fl">Até</label><input type="date" id="re" value="${S.rEnd}" style="margin-bottom:0;"></div><button class="fbtn ${S.rPeriod==='custom'?'on':''}" style="padding:12px 15px;" onclick="applyCP()">Aplicar</button></div>`;
  const vt=r.tv.length?`<div class="cc"><h3>Veículos com mais problemas</h3><table class="ts"><thead><tr><th>Placa</th><th>Checklists</th><th>Problemas</th></tr></thead><tbody>${r.tv.map(([p,d])=>`<tr><td>${p}</td><td>${d.t}</td><td>${d.p}</td></tr>`).join('')}</tbody></table></div>`:'';
  const pt=r.tp2.length?`<div class="cc"><h3>Problemas mais frequentes</h3><table class="ts"><thead><tr><th>Item</th><th>Ocorrências</th></tr></thead><tbody>${r.tp2.map(([i,n])=>`<tr><td>${i}</td><td>${n}</td></tr>`).join('')}</tbody></table></div>`:'';
  const pe=`<div class="cc"><h3>Checklists por pessoa</h3><table class="ts"><thead><tr><th>Nome</th><th>Checklists</th></tr></thead><tbody>${r.tpe.map(([n,c])=>`<tr><td>${n}</td><td>${c}</td></tr>`).join('')}</tbody></table></div>`;
  setTimeout(renderCharts,0);
  return`<div id="pr"><h1 class="t">Relatório geral</h1><p class="s">${r.label}</p>${pf}
    <div class="kg"><div class="kc"><div class="kv">${r.total}</div><div class="kl">Checklists</div></div><div class="kc"><div class="kv">${r.ps.pendente||0}</div><div class="kl">Pendentes</div></div><div class="kc"><div class="kv">${r.ps.aprovado||0}</div><div class="kl">Aprovados</div></div><div class="kc"><div class="kv">${r.tip}</div><div class="kl">Problemas</div></div></div>
    <div class="cc"><h3>Por perfil</h3><canvas id="cp" height="180"></canvas></div>
    <div class="cc"><h3>Enviados (${r.agm?'por mês':'por dia'})</h3><canvas id="ce" height="180"></canvas></div>
    ${vt}${pt}${pe}</div>
    <div class="erow np"><button class="ba" onclick="expXL()">⬇ Baixar Excel</button><button class="ba" onclick="expPPTX()">⬇ Baixar PowerPoint</button><button class="bs" onclick="window.print()">🖨 Gerar PDF</button></div>`;
}
function renderCharts(){
  const r=S.report;if(!r||typeof Chart==='undefined')return;
  const pc=document.getElementById('cp');
  if(pc){if(cpI)cpI.destroy();cpI=new Chart(pc,{type:'bar',data:{labels:['Motorista','Mecânico','Lavador'],datasets:[{data:[r.pp.motorista||0,r.pp.mecanico||0,r.pp.lavador||0],backgroundColor:['#1482C8','#0D5A94','#7FC1E8']}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0},title:{display:true,text:'Checklists'}}}}});}
  const ec=document.getElementById('ce');
  if(ec){if(ceI)ceI.destroy();
    const lb=r.go.map(g=>{if(r.agm){const[a,m]=g.split('-');const ns=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];return ns[Number(m)-1]+'/'+a.slice(2);}return g.slice(8)+'-'+g.slice(5,7);});
    ceI=new Chart(ec,{type:'line',data:{labels:lb,datasets:[{data:r.go.map(g=>r.pg[g]||0),borderColor:'#1482C8',backgroundColor:'rgba(20,130,200,0.15)',fill:true,tension:.25}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0},title:{display:true,text:'Checklists'}}}}});}
}
function rSvAv(){
  const h=S.avHist;if(!h.length)return'<div class="emp">Nenhuma avaliação ainda.</div>';
  const mp={};h.forEach(a=>{if(!a.motorista_id||a.nota_final===null)return;if(!mp[a.motorista_id])mp[a.motorista_id]={nome:a.motorista_nome,ns:[]};mp[a.motorista_id].ns.push(a.nota_final);});
  const rk=Object.values(mp).map(m=>({nome:m.nome,med:m.ns.reduce((s,n)=>s+n,0)/m.ns.length,q:m.ns.length})).sort((a,b)=>b.med-a.med);
  return`<h1 class="t">Avaliações de motoristas</h1>
    <div class="cc"><h3>Ranking</h3><table class="ts"><thead><tr><th>#</th><th>Motorista</th><th>Média</th><th>Classe</th><th>Aval.</th></tr></thead><tbody>${rk.map((r,i)=>{const cl=clsNota(r.med);return`<tr><td style="font-weight:700;color:var(--muted);">${i+1}</td><td>${r.nome}</td><td style="font-weight:700;color:${cl.c}">${r.med.toFixed(1)}</td><td style="font-weight:700;color:${cl.c}">${cl.l}</td><td>${r.q}</td></tr>`;}).join('')}</tbody></table></div>
    <div class="cc"><h3>Recentes</h3>${h.slice(0,15).map(a=>{const cl=a.nota_final!==null?clsNota(a.nota_final):null;return`<div class="drow" style="flex-direction:column;align-items:flex-start;gap:2px;"><div style="display:flex;justify-content:space-between;width:100%;"><span style="font-weight:600;">${a.motorista_nome}</span>${cl?`<span style="font-weight:700;color:${cl.c}">${a.nota_final.toFixed(1)} — ${cl.l}</span>`:''}</div><div style="font-size:12px;color:var(--muted);">${fmtD(a.criado_em)} · ${a.inspetor_nome}${a.veiculo_placa?' · '+a.veiculo_placa:''}${a.rota?' · '+a.rota:''}</div></div>`;}).join('')}</div>`;
}
function rInsp(){
  if(S.avScreen==='ok')return`<div class="sw"><div class="stamp" style="border-color:var(--ok);color:var(--ok);">ENVIADA</div><div class="sd">Avaliação salva.</div><button class="bp" onclick="SS({avScreen:'inicio'})">Nova avaliação</button><button class="bs" onclick="SS({avScreen:'historico'})">Ver histórico</button></div>`;
  const ts=`<div class="atabs"><button class="atab ${S.avScreen==='inicio'||S.avScreen==='form'?'on':''}" onclick="SS({avScreen:'inicio'})">📝 Avaliar</button><button class="atab ${S.avScreen==='historico'?'on':''}" onclick="SS({avScreen:'historico'})">📋 Histórico</button></div>`;
  if(S.avScreen==='historico'){
    const its=!S.avHist.length?'<div class="emp">Nenhuma avaliação ainda.</div>':S.avHist.map(a=>{const cl=a.nota_final!==null?clsNota(a.nota_final):null;return`<div class="hc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;"><div><div style="font-weight:700;font-size:15px;">${a.motorista_nome}</div><div style="font-size:12px;color:var(--muted);">${fmtD(a.criado_em)}${a.veiculo_placa?' · '+a.veiculo_placa:''}${a.rota?' · '+a.rota:''}</div></div>${a.nota_final!==null?`<div><div class="hn" style="color:${cl.c}">${a.nota_final.toFixed(1)}</div><div style="font-size:11px;font-weight:700;color:${cl.c};text-align:center;">${cl.l}</div></div>`:''}</div><div style="font-size:13px;color:var(--muted);">Padrão: ${a.nota_padrao!==null?a.nota_padrao.toFixed(1):'—'} · Vícios: ${a.nota_vicios!==null?a.nota_vicios.toFixed(1):'—'}</div>${a.observacoes?`<div style="font-size:13px;margin-top:7px;">${a.observacoes}</div>`:''}</div>`;}).join('');
    return ts+`<h1 class="t">Histórico</h1>`+its;
  }
  if(S.avScreen==='form'){
    const rp=S.avResp;const np=calcP(rp.p);const nv=calcV(rp.v);const nf=nFinal(np,nv);const cl=nf!==null?clsNota(nf):null;
    const tr=Object.keys(rp.p).length+Object.keys(rp.v).length;const ti=PADI.length+VICI.length;
    const mu=S.usuarios.find(u=>u.id===S.avMid);
    const sc=nf!==null?`<div class="scbox"><div class="scv">${nf.toFixed(1)}</div><div class="scl">Nota final</div><div class="scc" style="background:${cl.c}">${cl.l}</div><div class="msc"><div><div class="mv">${np!==null?np.toFixed(1):'—'}</div><div class="ml">Padrão</div></div><div><div class="mv">${nv!==null?nv.toFixed(1):'—'}</div><div class="ml">Vícios</div></div><div><div class="mv">${tr}/${ti}</div><div class="ml">Itens</div></div></div></div>`:`<div class="ppill" style="margin-bottom:14px;">${tr} de ${ti} respondidos</div>`;
    const pr=PADI.map((it,i)=>{const v=rp.p[it.id];return`<div class="ai"><div class="ait">${i+1}. ${it.t}</div><div class="abs"><button class="ab ${v==='A'?'sa':''}" onclick="setAR('p','${it.id}','A')">A</button><button class="ab ${v==='B'?'sb':''}" onclick="setAR('p','${it.id}','B')">B</button><button class="ab ${v==='33.3'?'sc':''}" onclick="setAR('p','${it.id}','33.3')">C</button></div></div>`;}).join('');
    const vr=VICI.map((it,i)=>{const v=rp.v[it.id];return`<div class="ai"><div class="ait">${i+1}. ${it.t}</div><div class="abs"><button class="ab ${v==='33.3'?'sl':''}" onclick="setAR('v','${it.id}','33.3')">Baixo</button><button class="ab ${v==='66.6'?'sm':''}" onclick="setAR('v','${it.id}','66.6')">Médio</button><button class="ab ${v==='99.9'?'sh':''}" onclick="setAR('v','${it.id}','99.9')">Alto</button></div></div>`;}).join('');
    return`<h1 class="t">${mu?mu.nome.split(' ')[0]:'—'}</h1><p class="s">Avaliação de condução</p>${sc}<div class="fc"><label class="fl">Observações (opcional)</label><textarea placeholder="Pontos de atenção, elogios..." oninput="S.avObs=this.value">${S.avObs}</textarea></div><div class="sb"><div class="sh"><span class="sn">01</span><span class="sname">Padrão de Condução</span></div><div class="fc">${pr}</div></div><div class="sb"><div class="sh"><span class="sn">02</span><span class="sname">Vícios — Intensidade</span></div><div class="fc">${vr}</div></div><div class="sfooter"><div class="ppill">${tr} de ${ti} itens · <span onclick="SS({avScreen:'inicio'})" style="cursor:pointer;text-decoration:underline;">trocar motorista</span></div><button class="bp" ${S.submitting?'disabled':''} onclick="submitAv()">${S.submitting?'Salvando...':'Enviar avaliação'}</button></div>`;
  }
  const mo=S.usuarios.map(m=>`<option value="${m.id}">${m.nome}</option>`).join('');
  const vo=(S.veiculos||[]).map(v=>`<option value="${v.placa}">${v.placa}</option>`).join('');
  const ro=(S.rotas||[]).map(r=>`<option value="${r.nome}">${r.nome}</option>`).join('');
  return ts+`<h1 class="t">Nova avaliação</h1>
    <label class="fl">Motorista</label><select onchange="SS({avMid:this.value})"><option value="">Selecione...</option>${mo}</select>
    <label class="fl">Veículo (opcional)</label><select onchange="S.avVeic=this.value"><option value="">—</option>${vo}</select>
    <label class="fl">Rota (opcional)</label><select onchange="S.avRota=this.value"><option value="">—</option>${ro}</select>
    <button class="bp" onclick="iniciarAv()">Iniciar avaliação</button>
    <button class="bs" onclick="SS({avScreen:'historico'})">Ver histórico</button>`;
}

function expXL(){
  const r=S.report;if(!r||typeof XLSX==='undefined')return;
  const wb=XLSX.utils.book_new();
  const rs=[['Período',r.label],['Métrica','Valor'],['Total',r.total],['Pendentes',r.ps.pendente||0],['Aprovados',r.ps.aprovado||0],['Problemas',r.tip],['Motorista',r.pp.motorista||0],['Mecânico',r.pp.mecanico||0],['Lavador',r.pp.lavador||0]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rs),'Resumo');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Placa','Checklists','Problemas'],...r.tv.map(([p,d])=>[p,d.t,d.p])]),'Veiculos');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Item','Ocorrências'],...r.tp2.map(([i,n])=>[i,n])]),'Problemas');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['Nome','Checklists'],...r.tpe.map(([n,c])=>[n,c])]),'Pessoas');
  XLSX.writeFile(wb,'relatorio-checklistop.xlsx');
}
async function expPPTX(){
  const r=S.report;if(!r||typeof PptxGenJS==='undefined')return;
  const pptx=new PptxGenJS();pptx.defineLayout({name:'C',width:10,height:5.63});pptx.layout='C';
  function addLogo(sl){sl.addText('Atalat ChecklistOP',{x:7.2,y:.15,w:2.7,h:.4,fontSize:11,color:'1482C8',bold:true,align:'right'});}
  function addChart(sl,cv,x,y,mw,mh){if(!cv)return;const rt=cv.width/cv.height;let w=mw,h=mw/rt;if(h>mh){h=mh;w=mh*rt;}sl.addImage({data:cv.toDataURL('image/png'),x:x+(mw-w)/2,y:y+(mh-h)/2,w,h});}
  let sl=pptx.addSlide();sl.background={color:'1482C8'};
  sl.addText('ChecklistOP',{x:.5,y:1.5,w:9,h:.7,fontSize:32,bold:true,color:'FFFFFF',align:'center'});
  sl.addText('Relatório Geral de Checklists',{x:.5,y:2.3,w:9,h:.6,fontSize:22,color:'FFFFFF',align:'center'});
  sl.addText(r.label,{x:.5,y:2.9,w:9,h:.4,fontSize:13,color:'D9EBFA',align:'center'});
  sl.addText(new Date().toLocaleDateString('pt-BR'),{x:.5,y:3.3,w:9,h:.4,fontSize:12,color:'D9EBFA',align:'center'});
  const hr=(cells,bg='1482C8')=>cells.map(t=>({text:t,options:{fill:{color:bg},color:'FFFFFF',bold:true,fontSize:12}}));
  const dr=(cells,alt)=>cells.map(t=>({text:String(t),options:{fill:{color:alt?'F1F4EC':'FFFFFF'},color:'1B241F',fontSize:11}}));
  sl=pptx.addSlide();addLogo(sl);sl.addText('Resumo',{x:.4,y:.3,fontSize:22,bold:true,color:'202B2A'});sl.addText(r.label,{x:.4,y:.75,fontSize:12,color:'63695C'});
  sl.addTable([hr(['Métrica','Valor']),...[['Total',r.total],['Pendentes',r.ps.pendente||0],['Aprovados',r.ps.aprovado||0],['Problemas',r.tip],['Motorista',r.pp.motorista||0],['Mecânico',r.pp.mecanico||0],['Lavador',r.pp.lavador||0]].map((row,i)=>dr(row,i%2===1))],{x:.4,y:1.1,w:7.2,fontSize:12,border:{type:'solid',color:'D6D9C9',pt:.5}});
  const cv1=document.getElementById('cp');if(cv1){sl=pptx.addSlide();addLogo(sl);sl.addText('Checklists por perfil',{x:.4,y:.3,fontSize:22,bold:true,color:'202B2A'});addChart(sl,cv1,.6,1.1,8,3.9);}
  const cv2=document.getElementById('ce');if(cv2){sl=pptx.addSlide();addLogo(sl);sl.addText(`Enviados (${r.agm?'por mês':'por dia'})`,{x:.4,y:.3,fontSize:22,bold:true,color:'202B2A'});sl.addText(r.label,{x:.4,y:.75,fontSize:12,color:'63695C'});addChart(sl,cv2,.6,1.3,8,3.7);}
  if(r.tv.length){sl=pptx.addSlide();addLogo(sl);sl.addText('Veículos com mais problemas',{x:.4,y:.3,fontSize:22,bold:true,color:'202B2A'});sl.addTable([hr(['Placa','Checklists','Problemas']),...r.tv.map(([p,d],i)=>dr([p,d.t,d.p],i%2===1))],{x:.4,y:1.1,w:7.2,fontSize:12,border:{type:'solid',color:'D6D9C9',pt:.5}});}
  if(r.tp2.length){sl=pptx.addSlide();addLogo(sl);sl.addText('Problemas mais frequentes',{x:.4,y:.3,fontSize:22,bold:true,color:'202B2A'});sl.addTable([hr(['Item','Ocorrências']),...r.tp2.map(([i,n],idx)=>dr([i,n],idx%2===1))],{x:.4,y:1.1,w:8.2,fontSize:12,border:{type:'solid',color:'D6D9C9',pt:.5}});}
  if(r.tpe.length){sl=pptx.addSlide();addLogo(sl);sl.addText('Checklists por pessoa',{x:.4,y:.3,fontSize:22,bold:true,color:'202B2A'});sl.addTable([hr(['Nome','Checklists']),...r.tpe.map(([n,c],idx)=>dr([n,c],idx%2===1))],{x:.4,y:1.1,w:7.2,fontSize:12,border:{type:'solid',color:'D6D9C9',pt:.5}});}
  await pptx.writeFile({fileName:'relatorio-checklistop.pptx'});
}

async function initApp(){
  let sv=null;try{sv=JSON.parse(localStorage.getItem('cop_s')||'null');}catch(e){}
  if(!sv||!sv.id){render();return;}
  S.cu=sv;
  if(sv.perfil==='supervisor'){S.screen='sv';render();await ldCL(S.clFilter);}
  else if(sv.perfil==='inspetor'){
    S.screen='insp';S.avScreen='inicio';render();
    const[m,v,r]=await Promise.all([sb.from('usuarios').select('id,nome').eq('perfil','motorista').eq('ativo',true).order('nome'),sb.from('veiculos').select('placa').eq('ativo',true).order('placa'),sb.from('rotas').select('nome').eq('ativo',true).order('nome')]);
    S.usuarios=m.data||[];S.veiculos=v.data||[];S.rotas=r.data||[];
    await ldAH();render();
  } else {
    S.screen='setup';S.itens=cpT(sv.perfil);render();
    await ldV();
    if(TMPL[sv.perfil]&&TMPL[sv.perfil].ur)await ldR();
    if(sv.perfil!=='motorista'){const{data}=await sb.from('usuarios').select('nome').eq('perfil','motorista').eq('ativo',true);S.motoristas=data||[];}
    if(sv.perfil==='mecanico')await ldMP();
    render();
  }
}
initApp();

</script>
